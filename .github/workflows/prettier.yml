name: autofix.ci
on:
  pull_request:
  push:
permissions: {}
jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
      - run: npm ci
      - run: npx prettier "**/*.ts" --write
      - run: npx eslint . --ext .js,.jsx,.ts,.tsx --fix
      - uses: autofix-ci/action@v1
        with:
          commit-message: "chore: fix linting and formatting"
